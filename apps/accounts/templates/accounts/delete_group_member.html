{% extends 'base.html' %}
{% block title %}Удаление участника{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="section-box">
            <h2 class="page-title mb-3">Удаление участника из группы</h2>
            <p>Вы уверены, что хотите удалить пользователя <strong>{{ member.user.full_name }}</strong> из группы <strong>{{ member.group.name }}</strong>?</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-outline-danger">Удалить</button>
                    <a href="{% url 'accounts:group_detail' member.group.id %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
