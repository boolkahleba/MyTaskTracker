{% extends 'base.html' %}
{% block title %}Создание группы{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="section-box">
            <h2 class="page-title mb-4">Создание группы</h2>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Название группы</label>
                    {{ form.name }}
                    {% if form.name.errors %}
                        <div class="text-danger small mt-1">{{ form.name.errors }}</div>
                    {% endif %}
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-outline-orange">Сохранить</button>
                    <a href="{% url 'accounts:group_list' %}" class="btn btn-secondary">Назад</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
