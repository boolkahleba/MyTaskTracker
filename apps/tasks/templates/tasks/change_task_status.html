{% extends 'base.html' %}
{% block title %}Изменение статуса{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="section-box">
            <h2 class="page-title mb-4">Изменение статуса задачи</h2>

            <div class="mb-4">
                <div class="text-muted">Задача</div>
                <div class="fs-5">{{ task.title }}</div>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Новый статус</label>
                    {{ form.status }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Фактическое время (часы)</label>
                    {{ form.actual_time_spent }}
                    <div class="form-text">Заполняется, если задача выводится из статуса «В работе».</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-outline-orange">Сохранить</button>
                    <a href="{% url 'tasks:task_detail' task.id %}" class="btn btn-secondary">Назад</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
