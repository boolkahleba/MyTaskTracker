{% extends 'base.html' %}
{% block title %}Удаление задачи{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="section-box">
            <h2 class="page-title mb-3">Удаление задачи</h2>
            <p>Вы уверены, что хотите удалить задачу <strong>{{ task.title }}</strong>?</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-outline-danger">Удалить</button>
                    <a href="{% url 'tasks:task_detail' task.id %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
