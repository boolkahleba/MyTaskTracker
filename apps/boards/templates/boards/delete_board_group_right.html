{% extends 'base.html' %}
{% block title %}Удаление прав группы{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="section-box">
            <h2 class="page-title mb-3">Удаление прав группы</h2>
            <p>Удалить группу <strong>{{ right.group.name }}</strong> из доступа к доске <strong>{{ right.board.name }}</strong>?</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-outline-danger">Удалить</button>
                    <a href="{% url 'boards:board_access' right.board.id %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
