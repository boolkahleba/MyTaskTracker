{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1f1f1f;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .navbar-dark-custom {
            background-color: #181818;
            border-bottom: 1px solid #383838;
        }

        .navbar-brand{
            color: #ff8c42;
        }

        .navbar-brand:hover{
            color: #ff6300;
        }

        .footer-dark-custom {
            background-color: #181818;
            border-top: 1px solid #383838;
            color: #bfbfbf;
        }

        .card-dark {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #f1f1f1;
        }

        .table-dark-custom {
            --bs-table-bg: #2a2a2a;
            --bs-table-striped-bg: #313131;
            --bs-table-striped-color: #f1f1f1;
            --bs-table-color: #f1f1f1;
            --bs-table-border-color: #444;
        }

        .form-control,
        .form-select,
        textarea {
            background-color: #2b2b2b !important;
            border: 1px solid #555 !important;
            color: #f1f1f1 !important;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus {
            background-color: #2b2b2b !important;
            color: #fff !important;
            border-color: #ff8c42 !important;
            box-shadow: 0 0 0 0.2rem rgba(255, 140, 66, 0.15) !important;
        }

        .form-text,
        .text-muted {
            color: #bdbdbd !important;
        }

        .btn-outline-orange {
            color: #ff9a4d;
            border-color: #ff9a4d;
        }

        .btn-outline-orange:hover {
            background-color: #ff9a4d;
            color: #181818;
        }

        .btn-orange {
            background-color: #ff8c42;
            color: #181818;
            border: none;
        }

        .btn-orange:hover {
            background-color: #ffa35f;
            color: #181818;
        }

        a {
            color: #ffb074;
            text-decoration: none;
        }

        a:hover {
            color: #ffc38f;
        }

        .kanban-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 1rem;
        }

        .kanban-column {
            display: inline-block;
            vertical-align: top;
            width: 320px;
            margin-right: 16px;
            white-space: normal;
        }

        .kanban-column-header {
            background-color: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .task-card {
            background-color: #2e2e2e;
            border: 1px solid #424242;
            border-left: 4px solid #ff8c42;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .badge-soft {
            background-color: #3b3b3b;
            color: #f1f1f1;
            font-weight: 400;
        }

        .page-title {
            font-weight: 600;
        }

        .section-box {
            background-color: #2a2a2a;
            border: 1px solid #3b3b3b;
            border-radius: 12px;
            padding: 20px;
        }

        .summary-box {
            background-color: #262626;
            border: 1px solid #3f3f3f;
            border-radius: 12px;
            padding: 18px;
            height: 100%;
        }

        hr {
            border-color: #454545;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/header.html' %}
    <main class="container py-4">
        {% include 'includes/messages.html' %}
        {% block content %}{% endblock %}
    </main>
    {% include 'includes/footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
